name: Comprehensive Error Detection

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  error-detection:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
      continue-on-error: false
    
    - name: Run TypeScript type check
      run: npx tsc --noEmit
      continue-on-error: true
    
    - name: Run Prettier check
      run: npm run format:check
      continue-on-error: true
    
    - name: Run security audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for circular dependencies
      run: npx madge --circular --extensions js,ts,tsx .
      continue-on-error: true
    
    - name: Check for large files
      run: |
        find . -type f \( -name "*.js" -o -name "*.ts" -o -name "*.tsx" \) -exec wc -l {} + | sort -rn | head -20
      continue-on-error: true
    
    - name: Run tests
      run: npm test
      continue-on-error: true
    
    - name: Upload error detection results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: error-detection-results
        path: |
          eslint-report.json
          tsc-output.txt
