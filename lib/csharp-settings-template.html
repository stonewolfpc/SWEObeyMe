<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C# Bridge</title>
  <style>
    body {
      font-family: var(--vscode-font-family);
      padding: 20px;
      color: var(--vscode-foreground);
      background-color: var(--vscode-editor-background);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: var(--vscode-foreground);
    }
    .coming-soon {
      font-size: 1.5em;
      color: var(--vscode-descriptionForeground);
      margin-bottom: 20px;
    }
    .description {
      font-size: 0.9em;
      color: var(--vscode-descriptionForeground);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>C# Bridge</h1>
    <div class="coming-soon">Coming Soon</div>
    <div class="description">
      The C# Bridge UI is currently under development. 
      This panel will provide real-time error monitoring, 
      configuration options, and diagnostic insights for C# code.
    </div>
  </div>
</body>
</html>
